services:
  postgres:
    image: postgres:latest
    container_name: servidor_postgres
    environment:
      POSTGRES_DB: teatro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql       
      - ./database-init:/docker-entrypoint-initdb.d